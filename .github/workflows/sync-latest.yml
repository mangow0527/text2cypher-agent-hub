name: Sync Latest Source Code

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-latest-source-code
  cancel-in-progress: false

jobs:
  sync:
    name: Sync NL2Cypher into agent hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare source repository access token
        env:
          RAW_SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          RAW_NL2CYPHER_REPO_TOKEN: ${{ secrets.NL2CYPHER_REPO_TOKEN }}
          RAW_KNOWLEDGE_REPO_TOKEN: ${{ secrets.KNOWLEDGE_REPO_TOKEN }}
          RAW_QA_REPO_TOKEN: ${{ secrets.QA_REPO_TOKEN }}
        run: |
          sanitize_token() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n')"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            value="${value#token }"
            value="${value#Bearer }"
            printf '%s' "${value}"
          }

          NL2CYPHER_TOKEN="$(sanitize_token "${RAW_NL2CYPHER_REPO_TOKEN:-${RAW_SOURCE_REPO_TOKEN:-}}")"
          KNOWLEDGE_TOKEN="$(sanitize_token "${RAW_KNOWLEDGE_REPO_TOKEN:-${RAW_SOURCE_REPO_TOKEN:-}}")"
          QA_TOKEN="$(sanitize_token "${RAW_QA_REPO_TOKEN:-${RAW_SOURCE_REPO_TOKEN:-}}")"

          missing_tokens=()
          [ -n "${NL2CYPHER_TOKEN}" ] || missing_tokens+=("NL2CYPHER_REPO_TOKEN or SOURCE_REPO_TOKEN")
          [ -n "${KNOWLEDGE_TOKEN}" ] || missing_tokens+=("KNOWLEDGE_REPO_TOKEN or SOURCE_REPO_TOKEN")
          [ -n "${QA_TOKEN}" ] || missing_tokens+=("QA_REPO_TOKEN or SOURCE_REPO_TOKEN")

          if [ "${#missing_tokens[@]}" -gt 0 ]; then
            echo "Repository access token secrets are required to checkout source repositories."
            printf 'Missing: %s\n' "${missing_tokens[@]}"
            echo "Use SOURCE_REPO_TOKEN for a classic PAT with access to all sources, or use per-repository fine-grained PATs."
            exit 1
          fi

          echo "::add-mask::${NL2CYPHER_TOKEN}"
          echo "::add-mask::${KNOWLEDGE_TOKEN}"
          echo "::add-mask::${QA_TOKEN}"
          echo "NL2CYPHER_REPO_TOKEN=${NL2CYPHER_TOKEN}" >> "${GITHUB_ENV}"
          echo "KNOWLEDGE_REPO_TOKEN=${KNOWLEDGE_TOKEN}" >> "${GITHUB_ENV}"
          echo "QA_REPO_TOKEN=${QA_TOKEN}" >> "${GITHUB_ENV}"

      - name: Checkout source repositories
        run: |
          mkdir -p _source _debug
          CHECKOUT_LOG="_debug/source-checkout.log"
          : > "${CHECKOUT_LOG}"

          clone_repo() {
            local label="$1"
            local repo_path="$2"
            local target="$3"
            local token="$4"

            {
              echo "=== Cloning ${label} ==="
              echo "Repository: https://github.com/${repo_path}.git"
              git clone --depth 1 "https://x-access-token:${token}@github.com/${repo_path}.git" "${target}"
              echo "Clone completed: ${label}"
              echo
            } >> "${CHECKOUT_LOG}" 2>&1

            if [ ! -d "${target}/.git" ]; then
              echo "::error title=Failed to clone ${label}::git clone failed for https://github.com/${repo_path}.git. See the job summary for log details."
              {
                echo "### Failed to clone ${label}"
                echo
                echo "Repository: https://github.com/${repo_path}.git"
                echo
                echo "Last lines from source-checkout.log:"
                echo
                echo '```text'
                tail -n 80 "${CHECKOUT_LOG}"
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 128
            fi
          }

          clone_repo "NL2Cypher" "mangow0527/NL2Cypher" "_source/NL2Cypher" "${NL2CYPHER_REPO_TOKEN}"
          clone_repo "knowledge-agent" "KG-AT-HOME/knowledge-agent" "_source/knowledge-agent" "${KNOWLEDGE_REPO_TOKEN}"
          clone_repo "qa-agent" "KG-AT-HOME/qa-agent" "_source/qa-agent" "${QA_REPO_TOKEN}"

      - name: Upload sync debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-debug-logs
          path: _debug/source-checkout.log
          if-no-files-found: ignore

      - name: Run sync scripts
        env:
          SOURCE_ROOT_NL2CYPHER: ${{ github.workspace }}/_source/NL2Cypher
          SOURCE_KNOWLEDGE: ${{ github.workspace }}/_source/knowledge-agent
          SOURCE_QA: ${{ github.workspace }}/_source/qa-agent
        run: ./sync/scripts/sync_all.sh

      - name: Commit and push changes
        run: |
          SYNC_PATHS=(
            agents/cypher-generator-agent
            agents/testing-agent
            agents/repair-agent
            agents/knowledge-agent
            agents/qa-agent
            console/runtime-console
            contracts
            sync/manifests/latest-sync.json
          )

          if [ -z "$(git status --porcelain -- "${SYNC_PATHS[@]}")" ]; then
            echo "No sync changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${SYNC_PATHS[@]}"
          git commit -m "chore: sync latest source code"
          git push origin HEAD:${{ github.ref_name }}
