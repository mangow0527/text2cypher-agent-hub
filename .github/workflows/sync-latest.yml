name: Sync Latest Source Code

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-latest-source-code
  cancel-in-progress: false

jobs:
  sync:
    name: Sync NL2Cypher into agent hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare source repository access token
        env:
          RAW_SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          if [ -z "${RAW_SOURCE_REPO_TOKEN}" ]; then
            echo "SOURCE_REPO_TOKEN secret is required to checkout external source repositories."
            echo "Create a fine-grained PAT or classic PAT with read access to mangow0527/NL2Cypher, KG-AT-HOME/knowledge-agent, and KG-AT-HOME/qa-agent."
            exit 1
          fi

          CLEAN_SOURCE_REPO_TOKEN="$(printf '%s' "${RAW_SOURCE_REPO_TOKEN}" | tr -d '\r\n')"
          if [ -z "${CLEAN_SOURCE_REPO_TOKEN}" ]; then
            echo "SOURCE_REPO_TOKEN secret is empty after trimming carriage returns and newlines."
            exit 1
          fi

          echo "::add-mask::${CLEAN_SOURCE_REPO_TOKEN}"
          echo "SOURCE_REPO_TOKEN=${CLEAN_SOURCE_REPO_TOKEN}" >> "${GITHUB_ENV}"

      - name: Checkout source repositories
        run: |
          mkdir -p _source
          AUTH_HEADER="$(printf 'x-access-token:%s' "${SOURCE_REPO_TOKEN}" | base64 -w 0)"

          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" clone --depth 1 https://github.com/mangow0527/NL2Cypher.git _source/NL2Cypher
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" clone --depth 1 https://github.com/KG-AT-HOME/knowledge-agent.git _source/knowledge-agent
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" clone --depth 1 https://github.com/KG-AT-HOME/qa-agent.git _source/qa-agent

      - name: Run sync scripts
        env:
          SOURCE_ROOT_NL2CYPHER: ${{ github.workspace }}/_source/NL2Cypher
          SOURCE_KNOWLEDGE: ${{ github.workspace }}/_source/knowledge-agent
          SOURCE_QA: ${{ github.workspace }}/_source/qa-agent
        run: ./sync/scripts/sync_all.sh

      - name: Commit and push changes
        run: |
          SYNC_PATHS=(
            agents/cypher-generator-agent
            agents/testing-agent
            agents/repair-agent
            agents/knowledge-agent
            agents/qa-agent
            console/runtime-console
            contracts
            sync/manifests/latest-sync.json
          )

          if [ -z "$(git status --porcelain -- "${SYNC_PATHS[@]}")" ]; then
            echo "No sync changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${SYNC_PATHS[@]}"
          git commit -m "chore: sync latest source code"
          git push origin HEAD:${{ github.ref_name }}
