<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Query Generator Console</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <main class="shell">
    <section class="hero card">
      <div>
        <p class="eyebrow">Query Generator Service</p>
        <h1>Q 接入与生成执行控制台</h1>
        <p class="lead">模拟外部服务向 Cypher 生成服务发送 `id + question`。服务会主动获取提示词、生成 Cypher，并把生成结果提交给测试服务。</p>
      </div>
      <div class="hero-badge">Q -> Prompt Fetch -> Cypher -> Testing</div>
    </section>

    <section class="grid">
      <form id="workflow-form" class="card form-panel">
        <div class="section-title">接收 QA 问题</div>

        <label>
          <span>ID</span>
          <input name="id" placeholder="例如：qa-001" />
        </label>

        <label>
          <span>自然语言问题</span>
          <textarea name="question" rows="4" placeholder="例如：查询网络设备及其端口"></textarea>
        </label>

        <div class="actions">
          <button type="submit">提交并执行</button>
          <button type="button" class="ghost" id="fill-normal">填充：正常样例</button>
          <button type="button" class="ghost" id="fill-ambiguous">填充：模糊问题</button>
        </div>
      </form>

      <section class="card result-panel">
        <div class="section-title">结果概览</div>
        <div class="status-strip" id="status-strip">等待执行</div>
        <div class="meta-grid" id="meta-grid">
          <div><span>ID</span><strong>-</strong></div>
          <div><span>生成运行标识</span><strong>-</strong></div>
          <div><span>生成状态</span><strong>-</strong></div>
          <div><span>失败阶段</span><strong>-</strong></div>
        </div>
        <div class="code-block">
          <div class="code-title">Generated Cypher</div>
          <pre id="generated-cypher">尚未生成</pre>
        </div>
      </section>
    </section>

    <section class="card details-panel">
      <div class="section-title">详细响应</div>
      <div class="tabs">
        <button class="tab active" data-tab="summary">摘要</button>
        <button class="tab" data-tab="execution">提示词与快照</button>
        <button class="tab" data-tab="raw">原始 JSON</button>
      </div>
      <div class="tab-content active" id="tab-summary">
        <div class="timeline" id="summary-view">
          <p class="empty">运行后这里会展示生成摘要。</p>
        </div>
      </div>
      <div class="tab-content" id="tab-execution">
        <pre id="execution-view">{}</pre>
      </div>
      <div class="tab-content" id="tab-raw">
        <pre id="raw-view">{}</pre>
      </div>
    </section>
  </main>

  <script src="/ui/app.js"></script>
</body>
</html>
