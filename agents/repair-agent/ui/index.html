<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repair Agent Console</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <main class="layout">
    <section class="masthead">
      <div>
        <p class="eyebrow">Repair Agent</p>
        <h1>知识修复诊断控制台</h1>
        <p>接收 testing-agent 的 IssueTicket，完成 LLM-first 诊断，并在可修复时投递 knowledge-agent 修复建议。</p>
      </div>
      <div class="pulse-card">
        <span></span>
        LLM-first Diagnosis
      </div>
    </section>

    <section class="panels">
      <section class="panel panel-form">
        <h2>诊断操作</h2>
        <button type="button" class="secondary" id="refresh-status">刷新服务状态</button>

        <div class="section-title">查询分析记录</div>
        <label>
          <span>analysis_id</span>
          <input id="analysis-id" placeholder="例如：analysis-ticket-001" />
        </label>
        <button type="button" class="secondary" id="lookup-analysis">查询分析记录</button>

        <div class="section-title">提交 IssueTicket</div>
        <label>
          <span>IssueTicket JSON</span>
          <textarea id="issue-ticket-json" rows="16" placeholder='{"ticket_id":"ticket-001","id":"qa-001",...}'></textarea>
        </label>
        <button type="button" id="submit-ticket">提交诊断</button>
      </section>

      <section class="panel panel-output">
        <h2>诊断结果</h2>
        <div class="banner" id="banner">等待操作</div>

        <div class="output-block">
          <h3>服务状态</h3>
          <pre id="status-view">加载中...</pre>
        </div>

        <div class="chips" id="chips"></div>

        <div class="output-block">
          <h3>分析记录</h3>
          <pre id="analysis-view">{}</pre>
        </div>

        <div class="output-block">
          <h3>提交结果</h3>
          <pre id="submit-view">{}</pre>
        </div>
      </section>
    </section>
  </main>

  <script src="/ui/app.js"></script>
</body>
</html>
